name: Fetch Articles Per Feed

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch-perfeed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Download follow-fetch
        run: |
          gh release download --repo ${{ secrets.FETCH_REPO }} \
            --pattern 'follow-fetch-linux-amd64' --output follow-fetch --clobber
          chmod +x follow-fetch
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}

      - name: Run fetch per feed
        run: ./follow-fetch fetch --accounts data/data/accounts.db --articles-db data/data/articles.db --mode perfeed --limit 50

      - name: Commit and push updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.db
          git diff --cached --quiet || git commit -m "auto: update articles.db after perfeed fetch"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              if git push; then break; fi
            else
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase || true
              git checkout --theirs data/articles.db 2>/dev/null || true
              git add data/articles.db
              git diff --cached --quiet || git commit -m "auto: update articles.db after perfeed fetch (retry $i)"
              if git push; then break; fi
            fi
          done
