name: RSS Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: rss-data-rss-db
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Download rss-check
        run: |
          gh release download --repo ${{ secrets.CHECKER_REPO }} \
            --pattern 'rss-check-linux-amd64' --output rss-check --clobber
          chmod +x rss-check
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}

      - name: Run check
        run: ./rss-check check --db data/data/rss.db --concurrency 20

      - name: Export summary
        run: |
          sqlite3 data/data/rss.db "
            SELECT
              status,
              COUNT(*) AS count
            FROM feed_checks
            WHERE is_latest = 1
            GROUP BY status
            ORDER BY count DESC;
          "

      - name: Commit and push updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rss.db
          git diff --cached --quiet || git commit -m "auto: update rss.db after health check"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              if git push; then break; fi
            else
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase || true
              git checkout --theirs data/rss.db 2>/dev/null || true
              git add data/rss.db
              git diff --cached --quiet || git commit -m "auto: update rss.db after health check (retry $i)"
              if git push; then break; fi
            fi
          done
