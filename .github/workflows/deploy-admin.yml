name: Deploy Admin Dashboard

on:
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rss-dashboard (for admin.html)
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DASHBOARD_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}

      - name: Checkout rss-data (for databases)
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: rss-data

      - name: Download rss-export
        run: |
          gh release download --repo ${{ secrets.DASHBOARD_REPO }} \
            --pattern 'rss-export-linux-amd64' --output rss-export --clobber
          chmod +x rss-export
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}

      - name: Install dependencies
        run: npm install esbuild wrangler@4

      - name: Export admin data
        run: |
          mkdir -p _deploy
          cp admin.html _deploy/
          ./rss-export export \
            --db rss-data/data/rss.db \
            --articles-db rss-data/data/articles_$(date -u +%Y_%m).db \
            --output _deploy

      - name: Upload articles-data.json to R2
        run: |
          npx wrangler r2 object put rss-dashboard-data/articles-data.json \
            --file _deploy/articles-data.json \
            --content-type application/json \
            --cache-control "public, max-age=300" \
            --remote
          rm -f _deploy/articles-data.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (rss-admin)
        run: npx wrangler pages deploy _deploy --project-name=rss-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
