name: Deploy Admin Dashboard

on:
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rss-dashboard (for admin.html)
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DASHBOARD_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}

      - name: Checkout rss-data (for databases)
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: rss-data

      - name: Download rss-export
        run: |
          gh release download --repo ${{ secrets.DASHBOARD_REPO }} \
            --pattern 'rss-export-linux-amd64' --output rss-export --clobber
          chmod +x rss-export
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}

      - name: Export admin data
        run: |
          mkdir -p _deploy
          cp admin.html _deploy/
          ./rss-export export \
            --db rss-data/data/rss.db \
            --articles-db rss-data/data/articles.db \
            --output _deploy

      - name: Deploy to Cloudflare Pages (rss-admin)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy _deploy --project-name=rss-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
