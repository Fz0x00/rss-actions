name: Daily Report

on:
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = 北京时间 00:00
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: private

      - name: Checkout followfetch repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rss-followfetch
          token: ${{ secrets.DATA_REPO_PAT }}
          path: followfetch

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: followfetch/go.sum

      - name: Build followfetch
        run: go build -o followfetch-build .
        working-directory: followfetch

      - name: Generate and send daily report
        run: ../followfetch/followfetch-build report
        working-directory: private
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
