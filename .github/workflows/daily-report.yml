name: Daily Report

on:
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = 北京时间 00:00
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout private scripts repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate and send daily report
        run: python3 private/scripts/daily-report.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
