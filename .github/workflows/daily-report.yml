name: Daily Report

on:
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = 北京时间 00:00
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: private

      - name: Checkout followfetch repo
        uses: actions/checkout@v5
        with:
          repository: Detect-DefenseLab/rssFollow
          token: ${{ secrets.DATA_REPO_PAT }}
          path: rssFollow
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: rssFollow/packages/rss-followfetch/go.sum

      - name: Build followfetch
        run: go build -o followfetch ./packages/rss-followfetch
        working-directory: rssFollow

      - name: Generate and send daily report
        run: ../rssFollow/followfetch report
        working-directory: private
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
