name: Summarize Articles

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:
    inputs:
      time-limit:
        description: 'Runtime window in minutes'
        required: false
        default: '25'
      article-limit:
        description: 'Maximum articles to summarize per run'
        required: false
        default: '50'
      platform:
        description: 'LLM platform (glm/groq/cerebras/tabbit)'
        required: false
        default: ''
      key-type:
        description: 'Only use keys with this key_type (free/coding_plan/paid)'
        required: false
        default: 'free'

concurrency:
  group: rss-data-articles-db
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Checkout followfetch repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rss-followfetch
          token: ${{ secrets.DATA_REPO_PAT }}
          path: followfetch

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: followfetch/go.sum

      - name: Build followfetch
        run: go build -o followfetch-build .
        working-directory: followfetch

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        if: ${{ github.event.inputs.platform == 'tabbit' || github.event.inputs.key-type == 'free' }}

      - name: Checkout tabbit-proxy
        if: ${{ github.event.inputs.platform == 'tabbit' || github.event.inputs.key-type == 'free' }}
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_PAT }}@github.com/${{ github.repository_owner }}/tabbit-proxy.git tabbit-proxy

      - name: Install tabbit dependencies
        if: ${{ github.event.inputs.platform == 'tabbit' || github.event.inputs.key-type == 'free' }}
        run: bun install
        working-directory: tabbit-proxy

      - name: Start tabbit proxy
        if: ${{ github.event.inputs.platform == 'tabbit' || github.event.inputs.key-type == 'free' }}
        run: |
          nohup bun run tabbit_proxy.ts > tabbit_proxy.log 2>&1 &
          echo $! > .tabbit_proxy.pid
          echo "TABBIT_PID=$(cat .tabbit_proxy.pid)" >> $GITHUB_ENV
          # 等待服务启动
          for i in {1..30}; do
            if curl -s http://localhost:8800/health > /dev/null 2>&1; then
              echo "Tabbit proxy ready"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:8800/health
        working-directory: tabbit-proxy
        env:
          TABBIT_TOKEN: ${{ secrets.TABBIT_TOKEN }}

      - name: Run summarizer
        run: |
          ARGS="--time-limit ${{ github.event.inputs.time-limit || '25' }} --limit ${{ github.event.inputs.article-limit || '50' }} --delay 1.5"
          if [ -n "${{ github.event.inputs.platform }}" ]; then
            ARGS="$ARGS --platform ${{ github.event.inputs.platform }}"
          fi
          if [ -n "${{ github.event.inputs.key-type || 'free' }}" ]; then
            ARGS="$ARGS --key-type ${{ github.event.inputs.key-type || 'free' }}"
          fi
          ../followfetch/followfetch-build summarize \
            --articles-db data/articles.db \
            --key-db data/key.db \
            --token-db data/token.db \
            $ARGS
        working-directory: data

      - name: Stop tabbit proxy
        if: always() && (github.event.inputs.platform == 'tabbit' || github.event.inputs.key-type == 'free')
        run: |
          if [ -f .tabbit_proxy.pid ]; then
            PID=$(cat .tabbit_proxy.pid)
            if kill -0 "$PID" 2>/dev/null; then
              echo "Stopping tabbit proxy (PID: $PID)"
              kill "$PID"
            fi
          fi
        working-directory: tabbit-proxy

      - name: Commit and push updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.db data/key.db data/token.db
          git diff --cached --quiet || git commit -m "auto: summarize articles with LLM"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              if git push; then break; fi
            else
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase || true
              git checkout --theirs data/articles.db 2>/dev/null || true
              git checkout --theirs data/key.db 2>/dev/null || true
              git checkout --theirs data/token.db 2>/dev/null || true
              git add data/articles.db data/key.db data/token.db
              git diff --cached --quiet || git commit -m "auto: summarize articles with LLM (retry $i)"
              if git push; then break; fi
            fi
          done
