name: Fetch Articles

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rss-data-articles-db
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Download follow-fetch
        run: |
          gh release download --repo ${{ secrets.FETCH_REPO }} \
            --pattern 'follow-fetch-linux-amd64' --output follow-fetch --clobber
          chmod +x follow-fetch
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}

      - name: Run fetch
        run: ./follow-fetch fetch --accounts data/data/accounts.db --articles-db data/data/articles.db --db data/data/rss.db --mode auto --limit 50

      - name: Commit and push updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MONTH=$(date -u +%Y_%m)
          git add "data/articles_${MONTH}.db"
          git diff --cached --quiet || git commit -m "auto: update articles_${MONTH}.db after fetch"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              if git push; then break; fi
            else
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase || true
              git checkout --theirs "data/articles_${MONTH}.db" 2>/dev/null || true
              git add "data/articles_${MONTH}.db"
              git diff --cached --quiet || git commit -m "auto: update articles_${MONTH}.db after fetch (retry $i)"
              if git push; then break; fi
            fi
          done
