name: Migrate Accounts

on:
  workflow_dispatch:
    inputs:
      json_path:
        description: 'Path to accounts.json in rss-data repo'
        required: false
        default: 'data/accounts.json'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Download folo-account
        run: |
          gh release download --repo ${{ secrets.ACCOUNT_REPO }} \
            --pattern 'folo-account-linux-amd64' --output folo-account --clobber
          chmod +x folo-account
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}

      - name: Run migrate
        run: ./folo-account migrate --json data/${{ inputs.json_path }} --db data/data/accounts.db

      - name: Commit and push updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/accounts.db
          git diff --cached --quiet || git commit -m "auto: update accounts.db after migration"
          git pull --rebase origin main
          git push
