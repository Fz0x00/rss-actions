name: Recompute Feed Scores

on:
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

concurrency:
  group: rss-data-rss-db
  cancel-in-progress: false

jobs:
  recompute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Checkout followfetch repo
        uses: actions/checkout@v5
        with:
          repository: Detect-DefenseLab/rssFollow
          token: ${{ secrets.DATA_REPO_PAT }}
          path: rssFollow
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: rssFollow/packages/rss-followfetch/go.sum

      - name: Build followfetch
        run: go build -o ../../followfetch .
        working-directory: rssFollow/packages/rss-followfetch

      - name: Run recompute
        run: ../rssFollow/followfetch score --rss-db data/data/rss.db --articles-db data/data/articles.db
        working-directory: data

      - name: Commit and push updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rss.db
          git diff --cached --quiet || git commit -m "auto: recompute feed priority scores"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              if git push; then break; fi
            else
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase || true
              git checkout --theirs data/rss.db 2>/dev/null || true
              git add data/rss.db
              git diff --cached --quiet || git commit -m "auto: recompute feed priority scores (retry $i)"
              if git push; then break; fi
            fi
          done
