name: Accounts Check

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: rss-data-accounts-db
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Download folo-account
        run: |
          gh release download --repo ${{ secrets.ACCOUNT_REPO }} \
            --pattern 'folo-account-linux-amd64' --output folo-account --clobber
          chmod +x folo-account
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}

      - name: Run accounts check
        run: ./folo-account accounts --accounts data/data/accounts.db --json

      - name: Commit and push updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/accounts.db
          git diff --cached --quiet || git commit -m "auto: update accounts.db after account check"
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              if git push; then break; fi
            else
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase || true
              git checkout --theirs data/accounts.db 2>/dev/null || true
              git add data/accounts.db
              git diff --cached --quiet || git commit -m "auto: update accounts.db after account check (retry $i)"
              if git push; then break; fi
            fi
          done
